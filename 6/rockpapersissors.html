<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
</head>
<body>

  <p>Game of Rock, Paper, Scissors!!!</p>

  <!-- ROCK -->
  <button onclick="
    var randomNo = Math.random();
    var computerMove = '';
    var result = '';

    if (randomNo < 1/3) {
      computerMove = 'rock';
    } else if (randomNo < 2/3) {
      computerMove = 'paper';
    } else {
      computerMove = 'scissors';
    }

    if (computerMove === 'rock') {
      result = 'It is a tie';
    } else if (computerMove === 'paper') {
      result = 'You lose';
    } else {
      result = 'You win';
    }

    alert(`You picked rock, computer picked ${computerMove}, ${result}`);
  ">Rock</button>


  <!-- PAPER -->
  <button onclick="
    var randomNo = Math.random();
    var computerMove = '';
    var result = '';

    if (randomNo < 1/3) {
      computerMove = 'rock';
    } else if (randomNo < 2/3) {
      computerMove = 'paper';
    } else {
      computerMove = 'scissors';
    }

    if (computerMove === 'rock') {
      result = 'You win';
    } else if (computerMove === 'paper') {
      result = 'It is a tie';
    } else {
      result = 'You lose';
    }

    alert(`You picked paper, computer picked ${computerMove}, ${result}`);
  ">Paper</button>


  <!-- SCISSORS -->
  <button onclick="
    var randomNo = Math.random();
    var computerMove = '';
    var result = '';

    if (randomNo < 1/3) {
      computerMove = 'rock';
    } else if (randomNo < 2/3) {
      computerMove = 'paper';
    } else {
      computerMove = 'scissors';
    }

    if (computerMove === 'rock') {
      result = 'You lose';
    } else if (computerMove === 'paper') {
      result = 'You win';
    } else {
      result = 'It is a tie';
    }

    alert(`You picked scissors, computer picked ${computerMove}, ${result}`);
  ">Scissors</button>

</body>
</html>
