<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object practice</title>
</head>
<body>
  <script>
    const product = {
      name : 'basketball',
      price : 2000
    }
    console.log(product);
    product.price = product.price+500;
    console.log(product);

    product['delivery-time'] = '3 days';
    console.log(product);

    const product1 ={
      name : 'shirt',
      price : 2000
    }

    const product2 = {
      name : 'shirt',
      price : 2000
    }

    function comparePrice(product1 , product2){
      if(product1.price > product2.price){
        return product2;
      }
      else {
        return product1;
      }
    }

    function isSame(product1 , product2){
      if(product1.name === product2.name && product1.price === product2.price){
        return true;
      } 
      else {
        return false;
      }
    }
    console.log(isSame(product1,product2));

  
    const cheaperProduct = comparePrice(product1,product2);
    console.log(cheaperProduct);

    const hi = 'GoOOD MORNIng';

    const lower = hi.toLowerCase();

    console.log(lower);

    const str = 'test';
    const repeat = str.repeat(2);
    console.log(repeat);
  
  </script>
</body>
</html>
