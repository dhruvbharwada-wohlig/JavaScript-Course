<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <input class="js-name-input" onkeydown="
      if(event.key === 'Enter'){
        showName();
      }
    ">
  <button class="js-submit-name" onclick="showName()">Submit</button>
  <p class="js-text"></p>
  <script>
    function showName(){
      const nameel = document.querySelector('.js-name-input');
      const name = nameel.value;

      document.querySelector('.js-text').innerHTML = `Your name is ${name}`;

    }
    
  </script>
</body>
</html>
