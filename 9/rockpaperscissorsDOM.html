<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
</head>
<body>

  <p>Game of Rock, Paper, Scissors!!!</p>

  
  <button onclick="playgame('rock')">Rock</button>

  <button onclick="playgame('paper')">Paper</button>

  
  <button onclick="playgame('scissors')">Scissors</button>
  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="js-score"></p>

  <button onclick="
  score.wins = 0;
  score.loss =0;
  score.tie = 0;
  localStorage.removeItem('score');
  updateScoreel();
  alert('Score was reset!')">Reset Score</button>



  <script>
    let score = JSON.parse(localStorage.getItem('score')) || { wins : 0 , loss : 0 , tie : 0}; 
    
    updateScoreel();

    function playgame(playerMove) {
      const computerMove = pickComputerMove();
      let result = '';

      if (playerMove === 'scissors') {
        if (computerMove === 'rock') {
          result = 'You lose';
        } else if (computerMove === 'paper') {
          result = 'You win';
        } else {
          result = 'It is a tie';
        }

      } else if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win';
        } else if (computerMove === 'paper') {
          result = 'It is a tie';
        } else {
          result = 'You lose';
        }

      } else { // rock
        if (computerMove === 'rock') {
          result = 'It is a tie';
        } else if (computerMove === 'paper') {
          result = 'You lose';
        } else {
          result = 'You win';
        }
      }

      if(result === 'You win'){
        score.wins+=1;
      }else if(result == 'You lose'){
        score.loss+=1;
      }else{
        score.tie+=1;
      }

      localStorage.setItem('score',JSON.stringify(score));

      updateScoreel();

      document.querySelector('.js-result')
        .innerHTML = `${result}`;

      document.querySelector('.js-moves')
        .innerHTML = `Your move was : ${playerMove} <br> Computer move was ${computerMove}`;


      // alert(`You picked ${playerMove}, computer picked ${computerMove}, ${result} \n Wins : ${score.wins} , Losses : ${score.loss} , Tied : ${score.tie}`);
      // console.log(score);
    }
    function updateScoreel(){
       document.querySelector('.js-score')
        .innerHTML =  `Wins : ${score.wins} , Losses : ${score.loss} , Tied : ${score.tie}`;

    }
    function pickComputerMove() {
      let computerMove = '';
      const randomNo = Math.random();

      if (randomNo < 1/3) {
        computerMove = 'rock';
      } else if (randomNo < 2/3) {
        computerMove = 'paper';
      } else {
        computerMove = 'scissors';
      }

      return computerMove;
    }
  </script>

</body>
</html>
