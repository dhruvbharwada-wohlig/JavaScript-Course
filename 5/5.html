<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    const name = 'Dhruv'
    console.log(name);

    console.log(`My name is ${name}`);

    let coffeeQ = 1;
    let bagelQ = 2;
    let soupQ = 1;

    let cost = 5*coffeeQ + 3*bagelQ + 9*soupQ;
    console.log(`The cost of the order is $ ${cost}`);

    let tax = cost * 0.1;
    console.log(`The tax of the order is $ ${tax}`);

    let totalCost = cost + tax;
    console.log(`The total cost of the order is $ ${totalCost}`);
  </script>
</body>
